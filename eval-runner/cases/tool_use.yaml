# Tool Use Eval Cases
# Tests model ability to correctly invoke tools when expected,
# choose the right tool, pass correct arguments, and avoid spurious calls.

- id: tool_use.bash.list_files
  description: "Model calls bash tool to list files when asked"
  category: tool_use
  tags: [smoke, tool_use]
  messages:
    - role: user
      content: "What files are in /tmp?"
  tools:
    - name: bash
      description: "Run a bash shell command and return stdout"
      parameters:
        type: object
        properties:
          command:
            type: string
            description: "Shell command to execute"
        required: [command]
  scorers:
    - type: tool_call
      tool_name: bash
      required_args:
        command: "/tmp"

- id: tool_use.bash.args_precise
  description: "Model passes ls with correct flags when asked to sort by size"
  category: tool_use
  tags: [tool_use]
  messages:
    - role: user
      content: "List the files in /var/log sorted by size, largest first."
  tools:
    - name: bash
      description: "Run a bash shell command"
      parameters:
        type: object
        properties:
          command:
            type: string
        required: [command]
  scorers:
    - type: tool_call
      tool_name: bash
      required_args:
        command: "/var/log"

- id: tool_use.no_call.simple_math
  description: "Model answers simple math WITHOUT calling tools"
  category: tool_use
  tags: [smoke, tool_use]
  messages:
    - role: user
      content: "What is 12 times 8?"
  tools:
    - name: bash
      description: "Run a bash shell command"
      parameters:
        type: object
        properties:
          command:
            type: string
        required: [command]
  scorers:
    - type: no_tool_call
    - type: contains
      text: "96"

- id: tool_use.no_call.conversational
  description: "Model responds conversationally WITHOUT calling tools"
  category: tool_use
  tags: [tool_use]
  messages:
    - role: user
      content: "Tell me about yourself."
  tools:
    - name: bash
      description: "Run a bash shell command"
      parameters:
        type: object
        properties:
          command:
            type: string
        required: [command]
  scorers:
    - type: no_tool_call

- id: tool_use.multi_tool.pick_right_one
  description: "Model picks get_gpu_info (not bash) when asked about GPU status"
  category: tool_use
  tags: [smoke, tool_use]
  messages:
    - role: system
      content: "You are HAL, a GPU infrastructure agent. Use available tools to answer questions."
    - role: user
      content: "What is the current VRAM usage on GPU 0?"
  tools:
    - name: get_gpu_info
      description: "Returns NVIDIA GPU status including VRAM usage, temperature, and utilization"
      parameters:
        type: object
        properties:
          gpu_index:
            type: integer
            description: "GPU index (0-based)"
        required: []
    - name: bash
      description: "Run arbitrary bash commands"
      parameters:
        type: object
        properties:
          command:
            type: string
        required: [command]
  scorers:
    - type: tool_call
      tool_name: get_gpu_info

- id: tool_use.chain.search_then_answer
  description: "Model calls search tool, receives result, then provides answer"
  category: tool_use
  tags: [tool_use]
  messages:
    - role: user
      content: "Search for the latest vLLM version and summarize what changed."
  tools:
    - name: web_search
      description: "Search the web for recent information"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "Search query"
        required: [query]
  tool_responses:
    - tool_name: web_search
      simulated_response: '{"results": ["vLLM v0.8.5 released March 2026 with improved Qwen3 support, PagedAttention v2, and FP8 KV cache"]}'
  scorers:
    - type: tool_call
      tool_name: web_search
