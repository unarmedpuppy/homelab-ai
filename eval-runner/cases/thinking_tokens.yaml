# Thinking Token Eval Cases
# Verifies that <think>...</think> tokens from Qwen3 and GLM reasoning models
# are stripped by the llm-router BEFORE the response reaches the client.
# These tags should NEVER appear in the final response.

- id: think.no_tags.simple_question
  description: "Basic question — no think tags in response"
  category: thinking_tokens
  tags: [smoke, thinking]
  messages:
    - role: user
      content: "What is 2 + 2?"
  scorers:
    - type: no_think_tags
    - type: contains
      text: "4"

- id: think.no_tags.arithmetic
  description: "Multi-step math — no think tags even for problems that trigger reasoning"
  category: thinking_tokens
  tags: [smoke, thinking]
  messages:
    - role: user
      content: "What is 47 * 83?"
  scorers:
    - type: no_think_tags
    - type: contains
      text: "3901"

- id: think.no_tags.coding
  description: "Code generation — no think tags in response"
  category: thinking_tokens
  tags: [thinking]
  messages:
    - role: user
      content: "Write a Python function to check if a number is prime."
  scorers:
    - type: no_think_tags
    - type: contains
      text: "def "

- id: think.no_tags.reasoning
  description: "Reasoning question — no think tags even for hard problems"
  category: thinking_tokens
  tags: [thinking]
  messages:
    - role: user
      content: "A bat and ball cost $1.10. The bat costs $1 more than the ball. How much does the ball cost?"
  scorers:
    - type: no_think_tags
    - type: contains
      text: "0.05"

- id: think.no_tags.tool_call
  description: "Tool calling response — no think tags when model is deciding to call a tool"
  category: thinking_tokens
  tags: [smoke, thinking, tool_use]
  messages:
    - role: user
      content: "What files are in /tmp?"
  tools:
    - name: bash
      description: "Run a bash command"
      parameters:
        type: object
        properties:
          command:
            type: string
        required: [command]
  scorers:
    - type: no_think_tags
    - type: tool_call
      tool_name: bash

- id: think.no_tags.long_response
  description: "Long explanation — no think tags in multi-paragraph response"
  category: thinking_tokens
  tags: [thinking]
  messages:
    - role: user
      content: "Explain how transformer attention works. Be thorough."
  scorers:
    - type: no_think_tags
    - type: word_count
      min_words: 50

- id: think.no_tags.glm_format
  description: "Verifies neither <think> nor </think> appear (GLM variant)"
  category: thinking_tokens
  tags: [thinking]
  messages:
    - role: user
      content: "What is the boiling point of water in Celsius?"
  scorers:
    - type: regex
      pattern: "</?think>"
      negate: true
    - type: contains
      text: "100"
