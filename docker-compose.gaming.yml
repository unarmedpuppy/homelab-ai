# Gaming PC deployment - LLM Manager, Image Server, TTS Server
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gaming.yml up -d
#
# Environment variables (set in .env):
#   HARBOR_REGISTRY - Harbor registry URL

services:
  llm-manager:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/llm-manager:latest
    container_name: llm-manager
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MODE=always-on
      - DEFAULT_MODEL=qwopus-moe-35b-q8
      - GAMING_MODE_ENABLED=true
      - IDLE_TIMEOUT=0
      - START_TIMEOUT=2400
      - GPU_MEMORY_UTILIZATION=0.90
      - CPU_OFFLOAD_GB=0
      - VLLM_IMAGE=${HARBOR_REGISTRY:-harbor.local}/library/vllm-custom:latest
      - LLAMA_IMAGE=${HARBOR_REGISTRY:-harbor.local}/library/llama.cpp-server:cuda
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - huggingface-cache:/root/.cache/huggingface
      - /mnt/c/models/quantized:/models
      - ./llm-manager/models.json:/app/models.json:ro
    networks:
      - ai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  image-server:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/image-server:latest
    container_name: image-server
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      - MODEL_ID=black-forest-labs/FLUX.1-dev
      - MODEL_NAME=black-forest-labs/FLUX.1-dev
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    networks:
      - ai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tts-server:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/tts-server:latest
    container_name: tts-server
    restart: unless-stopped
    ports:
      - "8006:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    networks:
      - ai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  video-server:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/video-server:latest
    container_name: video-server
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      - MODEL_ID=tencent/HunyuanVideo-1.5
      - GPU_COUNT=1
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    networks:
      - ai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Deploy webhook - accepts POST /deploy to pull new images and recreate containers
  deploy-webhook:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/deploy-webhook:latest
    container_name: deploy-webhook
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      - DEPLOY_SECRET=${DEPLOY_SECRET}
      - KNOWN_SERVICES=llm-manager,image-server,tts-server,video-server,gaming-dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ai-network

  # Optional: Web dashboard for gaming mode control
  gaming-dashboard:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/local-ai-dashboard:latest
    container_name: gaming-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - LLM_API_UPSTREAM=http://llm-manager:8000
      - LOCAL_AI_API_KEY=${LLM_ROUTER_API_KEY:-}
    networks:
      - ai-network

networks:
  ai-network:
    external: true

volumes:
  huggingface-cache:
    external: true
  gguf-models:
    external: true
