# Gaming PC deployment - AI Manager, Image Server, TTS Server
#
# Standalone compose for gaming PC (2x RTX 3090).
# Run from this repo root:
#   docker compose -f docker-compose.gaming.yml up -d
#
# Environment variables (set in .env):
#   HARBOR_REGISTRY - Harbor registry URL
#
# PATCHES_HOST_PATH must be the HOST path to the patches directory so that
# Docker Desktop can resolve bind mounts for sibling containers correctly.
# Using ${PWD} (expanded by docker compose to the project dir) avoids the
# /app/patches container-internal path bug that causes stale WSL bind mount
# hashes after Docker Desktop / WSL restarts.

services:
  ai-manager:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/ai-manager:latest
    container_name: ai-manager
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Chicago
      - MODE=always-on
      - DEFAULT_MODEL=qwopus-moe-35b-q8
      - GAMING_MODE_ENABLED=true
      - IDLE_TIMEOUT=0
      - START_TIMEOUT=2400
      - GPU_MEMORY_UTILIZATION=0.90
      - CPU_OFFLOAD_GB=0
      - MODELS_CONFIG_PATH=/app/models.json
      - VLLM_IMAGE=${HARBOR_REGISTRY:-harbor.local}/library/vllm-custom:latest
      - LLAMA_IMAGE=${HARBOR_REGISTRY:-harbor.local}/library/llama.cpp-server:cuda
      - VLLM_CARNICE_IMAGE=${HARBOR_REGISTRY:-harbor.local}/library/vllm-nightly-carnice:latest
      - GGUF_MODELS_PATH=/mnt/c/models/gguf
      - DOCKER_NETWORK=ai-network
      # HOST path - docker compose expands ${PWD} to the project directory so
      # sibling containers receive a real WSL path, not a container-internal one.
      # Never set this to /app/patches (container path) - that generates stale
      # WSL bind mount hashes that break after every Docker Desktop restart.
      - PATCHES_HOST_PATH=${PWD}/llm-manager/patches
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - huggingface-cache:/root/.cache/huggingface
      - /mnt/c/models/quantized:/models
      - /mnt/c/models/gguf:/gguf-models
      - ./llm-manager/models.json:/app/models.json:ro
      - ./llm-manager/patches:/app/patches:ro
    networks:
      - ai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  image-server:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/image-server:latest
    container_name: image-server
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      - MODEL_ID=black-forest-labs/FLUX.2-dev
      - MODEL_NAME=black-forest-labs/FLUX.2-dev
      - HF_TOKEN=${HF_TOKEN}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    networks:
      - ai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tts-server:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/tts-server:latest
    container_name: tts-server
    restart: unless-stopped
    ports:
      - "8006:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    networks:
      - ai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  deploy-webhook:
    image: ${HARBOR_REGISTRY:-harbor.local}/library/deploy-webhook:latest
    container_name: deploy-webhook
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      - DEPLOY_SECRET=${DEPLOY_SECRET}
      - KNOWN_SERVICES=ai-manager,image-server,tts-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ai-network

networks:
  ai-network:
    external: true

volumes:
  huggingface-cache:
    external: true
