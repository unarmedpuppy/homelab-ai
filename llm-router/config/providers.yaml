# Local AI Router - Provider and Model Configuration
# This file defines all available providers (hardware and cloud services)
# and the models they can serve.
#
# Environment Variable Overrides:
#   PROVIDER_{ID}_ENDPOINT - Override provider endpoint URL
#   PROVIDER_{ID}_ENABLED - Override provider enabled flag
#   PROVIDER_{ID}_API_KEY - Set API key for cloud providers

# ============================================================================
# PROVIDERS
# ============================================================================

providers:
  # Gaming PC with RTX 3090 - PRIMARY for auto-routing (when gaming mode OFF)
  # DISABLED: vllm-manager /v1/chat/completions times out (old local-ai stack, migration to homelab-ai pending)
  - id: gaming-pc-3090
    name: "Gaming PC (RTX 3090)"
    type: local
    description: "Gaming PC with RTX 3090 via LM Studio - primary for auto-routing when gaming mode OFF"
    endpoint: "${GAMING_PC_URL:-http://gaming-pc.local:8000}"
    priority: 1  # PRIMARY - default for auto-routing when gaming mode OFF
    enabled: false

    # Concurrency Control
    maxConcurrent: 1  # Single request at a time (GPU limitation)

    # Health Check Configuration
    healthCheckInterval: 30  # seconds
    healthCheckTimeout: 5    # seconds
    # /status is llm-manager's status endpoint — returns {"running": [...], "stopped": [...]}
    # healthCheckValidateRunning ensures the 200 is only trusted when vLLM containers are
    # actually running (llm-manager returns 200 for /status even when all containers stopped).
    healthCheckPath: "/status"
    healthCheckValidateRunning: true

    # Authentication (null for local vLLM)
    authType: null
    authSecret: null

    # Metadata
    gpu: "RTX 3090"
    vram: "24GB"
    location: "gaming-pc"
    powerWatts: 250  # Typical inference power draw (used for cost calculation)

  # Home Server with RTX 3070 - MANUAL ONLY (removed from auto-routing)
  - id: server-3070
    name: "Server (RTX 3070)"
    type: local
    description: "Home server with RTX 3070 via llm-manager - manual access only via explicit model=3070"
    endpoint: "${LOCAL_3070_URL:-http://llm-manager:8000}"
    priority: 99  # MANUAL ONLY - not used in auto-routing
    enabled: true

    # Concurrency Control
    maxConcurrent: 1  # Single request at a time (GPU limitation)

    # Health Check Configuration
    healthCheckInterval: 30  # seconds
    healthCheckTimeout: 5    # seconds
    healthCheckPath: "/health"  # llm-manager health endpoint

    # Authentication (null for local vLLM)
    authType: null
    authSecret: null

    # Metadata
    gpu: "RTX 3070"
    vram: "8GB"
    location: "home-server"
    powerWatts: 180

  # Cloud Provider - Z.ai (Coding Plan) - ESCALATION for large context
  - id: zai
    name: "Z.ai Coding Plan"
    type: cloud
    description: "Z.ai cloud API (GLM models) - escalation for 16K-100K context"
    endpoint: "https://api.z.ai/api/coding/paas/v4"
    priority: 2  # ESCALATION - for large context (16K-100K tokens)
    enabled: true

    # Concurrency Control
    maxConcurrent: 100  # Parallel requests OK (cloud service)

    # Health Check Configuration
    healthCheckInterval: 60  # seconds (less frequent for cloud)
    healthCheckTimeout: 10   # seconds (cloud may be slower)
    healthCheckPath: "/models"  # Use /models as health check (no /health endpoint)

    # Authentication
    authType: "bearer"
    authSecret: "ZAI_API_KEY"  # Environment variable name

    # Metadata
    location: "cloud"
    notes: "OpenAI-compatible API. No rate limits or cost concerns."

  # Claude Harness removed 2026-03-22.
  # Claude API access is now handled by claude-proxy (averys-mac-mini:8099).
  # Use the `use-claude` shell function to route a session to Claude directly.
  # See ADR: docs/adrs/2026-03-22-claude-oauth-proxy.md


